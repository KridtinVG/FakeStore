<div class="flex">
  <div class="flex-1 mr-4">
    <div class="flex flex-wrap -mx-2">
      <div
        *ngFor="let product of products"
        class="border p-4 rounded shadow cursor-pointer block-item"
        (click)="selectProduct(product)"
      >
        <img
          [src]="product.image"
          alt="{{ product.title }}"
          class="w-full h-full object-cover mb-2 img-item"
        />
        <h3
          class="font-bold mb-2 truncate max-w-[150px]"
          [title]="product.title"
        >
          {{ product.title }}
        </h3>
        <p class="text-sm text-gray-600 mb-1">{{ product.category }}</p>
        <p class="text-lg font-semibold">${{ product.price }}</p>
      </div>
    </div>
  </div>

  <aside class="md:w-1/3 border p-4 rounded shadow">
    <h2 class="font-bold mb-3">สินค้าที่เลือก</h2>
    <div *ngIf="selectedProducts.length === 0">ยังไม่ได้เลือกสินค้า</div>
    <div *ngFor="let item of selectedProducts" class="mb-3 border rounded p-3 bg-gray-50">
      <div class="flex justify-between items-start">
        <div class="max-w-[180px] truncate" [title]="item.title">{{ item.title }}</div>
        <button
          type="button"
          class="text-red-500 font-bold ml-2"
          (click)="removeProduct(item.id)"
        >
          ×
        </button>
      </div>
      <div class="flex items-center justify-between mt-2 text-sm text-gray-700">
        <div class="flex items-center space-x-2">
          <button
            type="button"
            class="px-2 py-1 bg-gray-200 rounded"
            (click)="changeQuantity(item.id, -1)"
          >
            -
          </button>
          <span>{{ item.quantity }}</span>
          <button
            type="button"
            class="px-2 py-1 bg-gray-200 rounded"
            (click)="changeQuantity(item.id, 1)"
          >
            +
          </button>
        </div>
        <div class="font-semibold">${{ item.price * item.quantity }}</div>
      </div>
    </div>
    <div class="font-bold flex justify-between mt-4">
      <span>Total</span>
      <span>${{ getTotalPrice() }}</span>
    </div>
  </aside>
</div>
