<div class="flex flex-col md:flex-row">
  <div class="flex-1 md:mr-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <div
        *ngFor="let product of products"
        class="border p-4 rounded shadow cursor-pointer transition hover:shadow-lg"
        (click)="selectProduct(product)"
      >
        <img
          [src]="product.image"
          alt="{{ product.title }}"
          class="w-full h-48 object-cover mb-2 rounded"
        />
        <h3 class="font-bold mb-2 truncate" [title]="product.title">
          {{ product.title }}
        </h3>
        <p class="text-sm text-gray-600 mb-1">{{ product.category }}</p>
        <p class="text-lg font-semibold">${{ product.price }}</p>
      </div>
    </div>
  </div>

  <aside class="hidden md:block md:w-1/3 border p-4 rounded shadow">
    <h2 class="font-bold mb-3">สินค้าที่เลือก</h2>
    <div *ngIf="selectedProducts.length === 0">ยังไม่ได้เลือกสินค้า</div>
    <div
      *ngFor="let item of selectedProducts"
      class="mb-3 border rounded p-3 bg-gray-50"
    >
      <div class="flex justify-between items-start">
        <div class="max-w-[180px] truncate" [title]="item.title">
          {{ item.title }}
        </div>
        <button
          type="button"
          class="text-red-500 font-bold ml-2"
          (click)="removeProduct(item.id)"
        >
          ×
        </button>
      </div>
      <div class="flex items-center justify-between mt-2 text-sm text-gray-700">
        <div class="flex items-center space-x-2">
          <button
            type="button"
            class="px-2 py-1 bg-gray-200 rounded"
            (click)="changeQuantity(item.id, -1)"
          >
            -
          </button>
          <span>{{ item.quantity }}</span>
          <button
            type="button"
            class="px-2 py-1 bg-gray-200 rounded"
            (click)="changeQuantity(item.id, 1)"
          >
            +
          </button>
        </div>
        <div class="font-semibold">${{ item.price * item.quantity }}</div>
      </div>
    </div>
    <div class="font-bold flex justify-between mt-4">
      <span>Total</span>
      <span>${{ getTotalPrice() }}</span>
    </div>
    <div>
      <button
        class="w-full bg-green-500 text-white rounded py-2 mt-4"
        (click)="proceedToCheckout()"
      >
        ชำระเงิน
      </button>
    </div>
  </aside>
</div>

<div class="md:hidden fixed bottom-4 left-4 right-4 z-30">
  <button
    type="button"
    class="w-full bg-indigo-600 text-white rounded-full py-3 px-4 shadow-lg flex items-center justify-between"
    (click)="toggleMobileCart = !toggleMobileCart"
  >
    <span>รถเข็น ({{ selectedProducts.length }})</span>
    <span class="font-semibold">${{ getTotalPrice() }}</span>
  </button>

  <div
    *ngIf="toggleMobileCart"
    class="mt-2 bg-white rounded-xl shadow-lg p-4 max-h-72 overflow-y-auto"
  >
    <div *ngIf="selectedProducts.length === 0" class="text-gray-500">
      ยังไม่ได้เลือกสินค้า
    </div>
    <div
      *ngFor="let item of selectedProducts"
      class="mb-3 border rounded p-3 bg-gray-50"
    >
      <div class="flex justify-between items-start">
        <div class="truncate max-w-[200px]" [title]="item.title">
          {{ item.title }}
        </div>
        <button
          type="button"
          class="text-red-500 font-bold ml-2"
          (click)="removeProduct(item.id)"
        >
          ×
        </button>
      </div>
      <div class="flex items-center justify-between mt-2 text-sm text-gray-700">
        <div class="flex items-center space-x-2">
          <button
            type="button"
            class="px-2 py-1 bg-gray-200 rounded"
            (click)="changeQuantity(item.id, -1)"
          >
            -
          </button>
          <span>{{ item.quantity }}</span>
          <button
            type="button"
            class="px-2 py-1 bg-gray-200 rounded"
            (click)="changeQuantity(item.id, 1)"
          >
            +
          </button>
        </div>
        <div class="font-semibold">${{ item.price * item.quantity }}</div>
      </div>
    </div>
    <button
      class="w-full bg-green-500 text-white rounded py-2 mt-4"
      (click)="proceedToCheckout()"
    >
      ชำระเงิน
    </button>
  </div>
</div>
